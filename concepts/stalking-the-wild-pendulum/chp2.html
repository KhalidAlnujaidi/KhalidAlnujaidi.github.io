<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Stalking the Wild Pendulum — A Look Through a Supermicroscope</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#070a14;
    --ink:#ece6d6;
    --muted:#7d879c;
    --cyan:#4fe6cd;
    --cyan-dim:#2c8a7d;
    --gold:#e7b257;
    --line:rgba(236,230,214,0.10);
    --panel:rgba(10,14,26,0.62);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--ink);
    font-family:"IBM Plex Mono",monospace;-webkit-font-smoothing:antialiased}
  #app{position:fixed;inset:0;
    background:
      radial-gradient(140% 100% at 78% 8%, rgba(231,178,87,0.07), transparent 42%),
      radial-gradient(120% 120% at 12% 92%, rgba(79,230,205,0.08), transparent 46%),
      radial-gradient(100% 100% at 50% 50%, #0a1020 0%, #060812 72%, #04060d 100%);
  }
  canvas{display:block;position:absolute;inset:0}

  /* ---- top bar ---- */
  #topbar{position:absolute;top:0;left:0;right:0;padding:22px 28px;z-index:5;
    display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none}
  .brand .kick{font-size:10px;letter-spacing:.32em;color:var(--cyan);text-transform:uppercase}
  .brand h1{font-family:"Cormorant Garamond",serif;font-weight:600;font-size:26px;
    line-height:1.05;margin-top:3px;letter-spacing:.01em}
  .brand .by{font-size:10.5px;color:var(--muted);letter-spacing:.14em;margin-top:4px}
  .hint{font-size:10px;color:var(--muted);letter-spacing:.18em;text-align:right;text-transform:uppercase}
  .hint b{color:var(--ink);font-weight:400}

  /* ---- nav ---- */
  #nav{position:absolute;left:28px;top:50%;transform:translateY(-50%);z-index:6;
    display:flex;flex-direction:column;gap:2px}
  .nav-item{pointer-events:auto;cursor:pointer;background:none;border:none;color:var(--muted);
    font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.06em;text-align:left;
    padding:9px 12px 9px 16px;border-left:2px solid transparent;display:flex;align-items:baseline;gap:10px;
    transition:color .25s,border-color .25s;white-space:nowrap}
  .nav-item .num{font-size:9px;color:var(--cyan-dim);width:14px}
  .nav-item .num.star{color:var(--gold);font-size:12px}
  .nav-item.active .num.star{color:var(--gold)}
  .ptitle .idx.star{color:var(--gold)}
  #panel.reflect{width:min(940px,calc(100% - 48px));background:rgba(9,12,22,0.93)}
  #panel.reflect #pBlurb{max-width:none;column-count:2;column-gap:36px;column-rule:1px solid rgba(231,178,87,.16);
    font-family:"Cormorant Garamond",serif;font-style:italic;font-weight:500;font-size:16.5px;
    line-height:1.62;color:var(--ink);max-height:40vh;overflow:auto;margin-top:14px;padding-right:2px}
  #panel.reflect #pBlurb .rhead{column-span:all;display:block;font-family:"IBM Plex Mono",monospace;
    font-style:normal;font-size:9.5px;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);margin-bottom:12px}
  #panel.reflect #pBlurb p{margin:0 0 13px;break-inside:avoid}
  #panel.reflect #pBlurb p:last-child{color:var(--gold)}
  .nav-item:hover{color:var(--ink)}
  .nav-item.active{color:var(--ink);border-left-color:var(--cyan)}
  .nav-item.active .num{color:var(--cyan)}

  /* ---- bottom panel ---- */
  #panel{position:absolute;left:50%;transform:translateX(-50%);bottom:22px;z-index:6;
    width:min(660px,calc(100% - 48px));background:var(--panel);
    border:1px solid var(--line);border-radius:14px;backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);padding:18px 22px 20px;
    box-shadow:0 24px 60px rgba(0,0,0,.5)}
  #panelToggle{position:absolute;top:12px;right:14px;width:26px;height:26px;border-radius:7px;
    background:rgba(236,230,214,.04);border:1px solid var(--line);color:var(--muted);cursor:pointer;
    font-size:12px;line-height:1;display:flex;align-items:center;justify-content:center;
    transition:color .2s,border-color .2s;z-index:2}
  #panelToggle:hover{color:var(--ink);border-color:rgba(79,230,205,.45)}
  #panel.collapsed{padding-bottom:14px}
  #panel.collapsed #pBlurb,#panel.collapsed #controls{display:none}
  #panel .ptitle{font-family:"Cormorant Garamond",serif;font-size:27px;font-weight:600;line-height:1;
    display:flex;align-items:baseline;gap:12px;padding-right:34px}
  #panel .ptitle .idx{font-family:"IBM Plex Mono";font-size:11px;color:var(--cyan);letter-spacing:.2em}
  .dim-badge{font-family:"IBM Plex Mono";font-size:10px;letter-spacing:.14em;color:var(--gold);
    border:1px solid rgba(231,178,87,.45);border-radius:5px;padding:2px 7px;align-self:center}
  .nav-item .dim{font-size:8.5px;letter-spacing:.1em;color:var(--cyan-dim);border:1px solid var(--line);
    border-radius:4px;padding:1px 5px;margin-left:6px}
  #panel .blurb{font-size:12px;line-height:1.62;color:#c6c2b6;margin-top:10px;max-width:62ch}
  #controls{display:flex;flex-wrap:wrap;gap:18px 26px;margin-top:16px;align-items:flex-end}
  .ctl{display:flex;flex-direction:column;gap:7px;min-width:130px}
  .ctl label{font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
  .ctl .val{color:var(--gold)}
  input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:2px;
    background:rgba(236,230,214,.2);border-radius:2px;outline:none;cursor:pointer}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;
    background:var(--cyan);cursor:pointer;box-shadow:0 0 10px rgba(79,230,205,.7)}
  input[type=range]::-moz-range-thumb{width:13px;height:13px;border:none;border-radius:50%;
    background:var(--cyan);cursor:pointer;box-shadow:0 0 10px rgba(79,230,205,.7)}
  .btnrow{display:flex;gap:6px;flex-wrap:wrap}
  .chip{font-family:"IBM Plex Mono";font-size:11px;color:var(--muted);background:rgba(236,230,214,.04);
    border:1px solid var(--line);border-radius:7px;padding:6px 11px;cursor:pointer;
    transition:all .2s;letter-spacing:.04em}
  .chip:hover{color:var(--ink);border-color:rgba(79,230,205,.4)}
  .chip.on{color:#06120f;background:var(--cyan);border-color:var(--cyan);font-weight:500}
  .meter{height:5px;background:rgba(236,230,214,.12);border-radius:3px;overflow:hidden;width:100%}
  .meter i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--cyan-dim),var(--cyan));
    transition:width .1s linear}

  #loader{position:absolute;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;
    background:var(--bg);color:var(--muted);font-size:11px;letter-spacing:.25em;text-transform:uppercase}

  @media (max-width:760px){
    #nav{position:absolute;left:0;right:0;top:auto;bottom:calc(100% - 100%);transform:none;
      flex-direction:row;overflow-x:auto;gap:0;padding:0 16px;
      top:84px;bottom:auto;-webkit-overflow-scrolling:touch}
    .nav-item{padding:8px 10px;border-left:none;border-bottom:2px solid transparent}
    .nav-item.active{border-left:none;border-bottom-color:var(--cyan)}
    .nav-item .num{display:none}
    #panel{bottom:14px;padding:14px 16px 16px}
    #panel.reflect #pBlurb{column-count:1}
    #panel .ptitle{font-size:22px}
    .brand h1{font-size:20px}
    .hint{display:none}
  }
</style>
</head>
<body>
<div id="app">
  <div id="loader">descending into the microreality…</div>
  <div id="topbar">
    <div class="brand">
      <div class="kick">Stalking the Wild Pendulum</div>
      <h1>A Look Through a Supermicroscope</h1>
      <div class="by">after Itzhak Bentov · Ch. 2</div>
    </div>
    <div class="hint"><b>drag</b> to orbit<br><b>scroll</b> to zoom</div>
  </div>
  <nav id="nav"></nav>
  <div id="panel">
    <button id="panelToggle" title="Hide panel">▾</button>
    <div class="ptitle"><span class="idx" id="pIdx">01</span><span id="pTitle"></span><span class="dim-badge" id="pDim"></span></div>
    <div class="blurb" id="pBlurb"></div>
    <div id="controls"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
"use strict";
const TAU = Math.PI*2;

/* ============================================================= renderer */
const app = document.getElementById('app');
// ?record → opaque canvas so translucent/additive glows capture at their true (faint) strength.
// A transparent canvas gets its alpha un-premultiplied during captureStream, which wrongly boosts
// every low-opacity field/glow to full brightness in the video. Opaque clear avoids that entirely.
const REC=/[?&]record\b/.test(location.search);
const renderer = new THREE.WebGLRenderer({antialias:true, alpha:!REC, preserveDrawingBuffer:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setClearColor(REC?0x070a14:0x000000, REC?1:0);
app.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 400);
const clock = new THREE.Clock();

const root = new THREE.Group();           // per-concept content lives here
scene.add(root);

/* lights (used by lit scenes) */
const amb = new THREE.AmbientLight(0x6a78a0, 0.55); scene.add(amb);
const key = new THREE.DirectionalLight(0xfff0d8, 0.9); key.position.set(4,7,6); scene.add(key);
const rim = new THREE.DirectionalLight(0x4fe6cd, 0.5); rim.position.set(-6,2,-5); scene.add(rim);

/* persistent starfield */
(function stars(){
  const N=1400, g=new THREE.BufferGeometry(), p=new Float32Array(N*3);
  for(let i=0;i<N;i++){
    const r=60+Math.random()*120, t=Math.random()*TAU, ph=Math.acos(2*Math.random()-1);
    p[i*3]=r*Math.sin(ph)*Math.cos(t); p[i*3+1]=r*Math.cos(ph); p[i*3+2]=r*Math.sin(ph)*Math.sin(t);
  }
  g.setAttribute('position',new THREE.BufferAttribute(p,3));
  const m=new THREE.PointsMaterial({color:0x9fb0d0,size:0.45,transparent:true,opacity:0.5,
    sizeAttenuation:true});
  const pts=new THREE.Points(g,m); pts.name='__stars'; scene.add(pts);
  scene.userData.stars=pts;
})();

/* ============================================================= camera orbit */
const cam = {theta:0.7, phi:1.05, radius:9, target:new THREE.Vector3(0,0,0),
             auto:true, autoSpeed:0.05, rmin:3, rmax:30};
function applyCam(){
  const sp=Math.sin(cam.phi);
  camera.position.set(
    cam.target.x + cam.radius*sp*Math.cos(cam.theta),
    cam.target.y + cam.radius*Math.cos(cam.phi),
    cam.target.z + cam.radius*sp*Math.sin(cam.theta));
  camera.lookAt(cam.target);
}
let dragging=false, lastX=0, lastY=0, pinchD=0, idle=0;
const el=renderer.domElement;
function down(x,y){dragging=true;lastX=x;lastY=y;cam.auto=false;idle=0;}
function move(x,y){ if(!dragging)return;
  cam.theta -= (x-lastX)*0.006;
  cam.phi = Math.max(0.12, Math.min(Math.PI-0.12, cam.phi - (y-lastY)*0.006));
  lastX=x;lastY=y; }
function up(){dragging=false;}
el.addEventListener('mousedown',e=>down(e.clientX,e.clientY));
window.addEventListener('mousemove',e=>move(e.clientX,e.clientY));
window.addEventListener('mouseup',up);
el.addEventListener('wheel',e=>{e.preventDefault();
  cam.radius=Math.max(cam.rmin,Math.min(cam.rmax,cam.radius*(1+e.deltaY*0.0011)));cam.auto=false;idle=0;
},{passive:false});
el.addEventListener('touchstart',e=>{
  if(e.touches.length===1){down(e.touches[0].clientX,e.touches[0].clientY);}
  else if(e.touches.length===2){pinchD=Math.hypot(
    e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);}
},{passive:true});
el.addEventListener('touchmove',e=>{
  if(e.touches.length===1){move(e.touches[0].clientX,e.touches[0].clientY);}
  else if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    if(pinchD){cam.radius=Math.max(cam.rmin,Math.min(cam.rmax,cam.radius*(pinchD/d)));}
    pinchD=d;cam.auto=false;idle=0;}
},{passive:true});
el.addEventListener('touchend',()=>{dragging=false;pinchD=0;});

/* ============================================================= helpers */
function clearGroup(g){
  for(let i=g.children.length-1;i>=0;i--){
    const c=g.children[i];
    if(c.geometry)c.geometry.dispose();
    if(c.material){(Array.isArray(c.material)?c.material:[c.material]).forEach(m=>{
      if(m.map)m.map.dispose(); m.dispose();});}
    g.remove(c);
  }
}
function makeLabel(text,color,w){
  const cw=w||256;
  const c=document.createElement('canvas'); c.width=cw;c.height=64;
  const x=c.getContext('2d');
  x.fillStyle=(typeof color==='number')?'#'+color.toString(16).padStart(6,'0'):(color||'#4fe6cd');
  x.font='600 30px "IBM Plex Mono",monospace';x.textAlign='center';x.textBaseline='middle';
  x.fillText(text,cw/2,34);
  const t=new THREE.CanvasTexture(c);t.minFilter=THREE.LinearFilter;
  const s=new THREE.Sprite(new THREE.SpriteMaterial({map:t,transparent:true,depthTest:false,opacity:.9}));
  s.scale.set(1.7*(cw/256),0.42,1); return s;
}

/* control-panel builders -------------------------------------------------- */
const controlsEl=document.getElementById('controls');
function clearControls(){controlsEl.innerHTML='';}
function ctlSlider(o){ // {label,min,max,value,step,fmt,onInput}
  const w=document.createElement('div');w.className='ctl';
  const lab=document.createElement('label');
  const val=document.createElement('span');val.className='val';
  const fmt=o.fmt||(v=>v);
  lab.textContent=o.label+' · '; lab.appendChild(val); val.textContent=fmt(o.value);
  const inp=document.createElement('input');inp.type='range';
  inp.min=o.min;inp.max=o.max;inp.step=o.step||1;inp.value=o.value;
  inp.addEventListener('input',()=>{val.textContent=fmt(+inp.value);o.onInput(+inp.value);});
  w.appendChild(lab);w.appendChild(inp);controlsEl.appendChild(w);return inp;
}
function ctlChips(o){ // {label,options:[{label,value}],value,onPick}
  const w=document.createElement('div');w.className='ctl';
  const lab=document.createElement('label');lab.textContent=o.label;
  const row=document.createElement('div');row.className='btnrow';
  o.options.forEach(op=>{
    const b=document.createElement('button');b.className='chip'+(op.value===o.value?' on':'');
    b.textContent=op.label;
    b.addEventListener('click',()=>{[...row.children].forEach(c=>c.classList.remove('on'));
      b.classList.add('on');o.onPick(op.value);});
    row.appendChild(b);
  });
  w.appendChild(lab);w.appendChild(row);controlsEl.appendChild(w);return row;
}
function ctlButton(label,onClick){
  const b=document.createElement('button');b.className='chip';b.textContent=label;
  b.style.alignSelf='flex-end';b.addEventListener('click',onClick);controlsEl.appendChild(b);return b;
}
function ctlMeter(label){
  const w=document.createElement('div');w.className='ctl';w.style.minWidth='150px';
  const lab=document.createElement('label');const val=document.createElement('span');
  val.className='val';lab.textContent=label+' · ';lab.appendChild(val);
  const m=document.createElement('div');m.className='meter';const i=document.createElement('i');
  m.appendChild(i);w.appendChild(lab);w.appendChild(m);controlsEl.appendChild(w);
  return {set:v=>{i.style.width=(v*100).toFixed(0)+'%';val.textContent=(v*100).toFixed(0)+'%';}};
}
function ctlReadout(label){
  const w=document.createElement('div');w.className='ctl';w.style.minWidth='150px';
  w.innerHTML='<label>'+label+'</label><span style="font-family:Cormorant Garamond,serif;font-size:26px;color:var(--gold);line-height:1"></span>';
  controlsEl.appendChild(w); return w.querySelector('span');
}

/* opacity helpers (for cross-fading sub-groups) -------------------------- */
function regOpacity(grp){
  grp.traverse(o=>{ if(o.material){
    (Array.isArray(o.material)?o.material:[o.material]).forEach(m=>{
      if(m.userData.op0===undefined){m.userData.op0=(m.opacity!==undefined?m.opacity:1);m.transparent=true;}
    });}});
}
function setOpacity(grp,k){
  grp.traverse(o=>{ if(o.material){
    (Array.isArray(o.material)?o.material:[o.material]).forEach(m=>{
      m.opacity=(m.userData.op0!==undefined?m.userData.op0:1)*k;
    });}});
}

/* ============================================================= CONCEPTS */
const COL_CYAN=0x4fe6cd, COL_GOLD=0xe7b257, COL_INK=0xece6d6;

const CONCEPTS=[];

/* --- 1. THE SUPERMICROSCOPE --------------------------------------------- */
CONCEPTS.push({
  title:"The Supermicroscope", dim:"×10⁹",
  blurb:"Take an imaginary microscope that magnifies until single atoms swim into view, and aim it at a scrap of living tissue. The gooey mess resolves into aligned muscle fibres, then long coiled molecules, then an almost crystalline lattice of vibrating atoms. Push further and the electron shell dissolves into vacuum, the nucleus into a shadowy pulsation — until solid matter is gone entirely, replaced by vast empty space threaded with oscillating fields. Drag the magnification and make the descent yourself.",
  cam:{theta:0.7,phi:1.0,radius:9,auto:true,autoSpeed:0.06,rmin:5,rmax:20,target:[0,0,0]},
  build(g){
    const NAMES=["TISSUE","MUSCLE FIBRES","COILED MOLECULE","CRYSTAL LATTICE","THE ATOM","VACUUM","OSCILLATING FIELDS"];
    const stages=[];
    let mag=0, magTarget=0, diveDwell=0, diving=false, slider=null;

    /* stage 0 — a flexed arm (one continuous swept form); we dive into the bicep */
    const s0=new THREE.Group();{
      const skin=new THREE.MeshStandardMaterial({color:0xceA079,emissive:0x2c1a0e,emissiveIntensity:.35,roughness:.74,metalness:.05});
      const arm=new THREE.Group();
      // flexed-arm centreline: shoulder → bicep belly → elbow → forearm belly → wrist
      const CP=[
        [-2.15,0.62,0.00],[-1.55,0.42,0.05],[-0.78,0.10,0.06],[-0.05,-0.30,0.04],
        [0.72,-0.55,0.00],[0.95,0.18,-0.02],[0.82,0.98,-0.02],[0.58,1.66,0.00]];
      // radius at each control point — thick bicep, pinched elbow, tapering wrist
      const RP=[0.56,0.66,0.72,0.54,0.44,0.55,0.42,0.25];
      const pts=CP.map(p=>new THREE.Vector3(p[0],p[1],p[2]));
      const curve=new THREE.CatmullRomCurve3(pts,false,'catmullrom',0.5);
      const radiusAt=u=>{ const x=u*(RP.length-1),i=Math.min(RP.length-2,Math.floor(x)),f=x-i;
        const s=f*f*(3-2*f); return RP[i]*(1-s)+RP[i+1]*s; };
      // build a variable-radius tube; cross-section spans the in-plane normal and the z axis
      const TS=140,RS=22,posA=[],idx=[];
      const up=new THREE.Vector3(0,0,1),P=new THREE.Vector3(),Pn=new THREE.Vector3(),T=new THREE.Vector3(),Nin=new THREE.Vector3();
      for(let i=0;i<=TS;i++){
        const u=i/TS; curve.getPoint(u,P); curve.getPoint(Math.min(1,u+0.002),Pn);
        T.subVectors(Pn,P).normalize(); Nin.crossVectors(T,up).normalize();
        const r=radiusAt(u);
        for(let j=0;j<=RS;j++){const v=j/RS*TAU,c=Math.cos(v),sn=Math.sin(v);
          posA.push(P.x+r*(c*Nin.x+sn*up.x),P.y+r*(c*Nin.y+sn*up.y),P.z+r*(c*Nin.z+sn*up.z));}
      }
      for(let i=1;i<=TS;i++)for(let j=1;j<=RS;j++){
        const a=(RS+1)*(i-1)+(j-1),b=(RS+1)*i+(j-1),c=(RS+1)*i+j,d=(RS+1)*(i-1)+j;
        idx.push(a,b,d,b,c,d);
      }
      const armGeo=new THREE.BufferGeometry();
      armGeo.setAttribute('position',new THREE.Float32BufferAttribute(posA,3));
      armGeo.setIndex(idx); armGeo.computeVertexNormals();
      arm.add(new THREE.Mesh(armGeo,skin));
      // rounded shoulder/deltoid cap blending the arm into an implied torso
      const delt=new THREE.Mesh(new THREE.SphereGeometry(0.82,26,20),skin);
      delt.position.set(-2.15,0.66,0);delt.scale.set(1.0,1.05,0.92);arm.add(delt);
      // a clean rounded hand at the wrist — no fingers, a generic closed-hand mass
      const wrist=pts[pts.length-1];
      const upF=new THREE.Vector3().subVectors(pts[7],pts[6]).normalize();
      const fistC=wrist.clone().add(upF.clone().multiplyScalar(0.20));
      const hand=new THREE.Mesh(new THREE.SphereGeometry(0.33,28,22),skin);
      hand.position.copy(fistC); hand.scale.set(1.12,1.05,0.94); arm.add(hand);
      arm.scale.setScalar(0.95); arm.position.y=-0.15;
      s0.add(arm);
      const bicepC=new THREE.Vector3(-0.78,0.10,0.06);
      const bicepS0=bicepC.clone().multiplyScalar(0.95).add(new THREE.Vector3(0,-0.15,0));
      s0.userData.upd=(dt,t)=>{
        arm.rotation.y=Math.sin(t*0.16)*0.22-0.12; arm.rotation.z=Math.sin(t*0.12)*0.03;
        // dive-in: as magnification rises out of stage 0, fly toward the bicep
        const z=Math.max(0,Math.min(1,mag)),sc=1+z*2.4; s0.scale.setScalar(sc);

    const s2=new THREE.Group();{

          if(grid[key]!==undefined){const a=nodes[grid[i+','+j+','+kk]],b=nodes[grid[key]];

      const lg=new THREE.BufferGeometry();lg.setAttribute('position',new THREE.Float32BufferAttribute(lpos,3));

          a[i*3]=x;a[i*3+1]=Math.sin(x*wv.k-t*wv.sp+wv.ph)*wv.amp;a[i*3+2]=Math.cos(x*wv.k*0.6-t*wv.sp)*wv.amp*0.4;}
        wv.geo.attributes.position.needsUpdate=true;});};
    }

    [s0,s1,s2,s3,s4,s5,s6].forEach(s=>{s.visible=false;g.add(s);regOpacity(s);stages.push(s);});

    // floating stage label

    function fadeK(m,i){ let k=1-2*Math.abs(m-i); if(k<=0)return 0; if(k>=1)return 1; return k*k*(3-2*k); }

          else magTarget+=1; diveDwell=0; }

        mag += (magTarget-mag)*Math.min(1,dt*3.0);

        if(s.visible){ setOpacity(s,k); if(s.userData.upd)s.userData.upd(dt,t); } });

    return {update};
  }
});

      const aw=t*0.4, bw=t*0.27, P=[];
      for(let i=0;i<16;i++){ let x=v4[i][0],y=v4[i][1],z=v4[i][2],w=v4[i][3];
        let x2=x*Math.cos(aw)-w*Math.sin(aw), w2=x*Math.sin(aw)+w*Math.cos(aw);
        let y2=y*Math.cos(bw)-w2*Math.sin(bw), w3=y*Math.sin(bw)+w2*Math.cos(bw);
        const k=2/(3-w3); P.push([x2*k,y2*k,z*k]); }
      const tp=tessGeo.attributes.position.array;
      e4.forEach((e,i)=>{ const a=P[e[0]],b=P[e[1]];
        tp[i*6]=a[0];tp[i*6+1]=a[1];tp[i*6+2]=a[2]; tp[i*6+3]=b[0];tp[i*6+4]=b[1];tp[i*6+5]=b[2]; });
      tessGeo.attributes.position.needsUpdate=true;
      // skin the cosmos cell onto its projected vertices (P[0..7] = the w=-1 cell)
      const cf=cosmosCell.geometry.attributes.position.array;
      for(let j=0;j<8;j++){ const pc=P[j]; cf[j*3]=pc[0];cf[j*3+1]=pc[1];cf[j*3+2]=pc[2]; }
      cosmosCell.geometry.attributes.position.needsUpdate=true;
      // Big-Bang cycle: advance only while the Beyond cell is on screen, so each arrival is born from
      // a fresh singularity. E expands the universe 0→1 then crunches it back; each star hatches in
      // after its own birth fraction, so galaxies appear one after another.
      if(D.visible) bbT+=dt; else bbT=0;
      const u=(bbT/BB_PERIOD)%1, ez=x=>x*x*(3-2*x);
      // fast burst → long bright life → crunch back to the point
      const E = u<0.16 ? ez(u/0.16) : u<0.80 ? 1 : 1-ez((u-0.80)/0.20);
      // project the galaxy through the SAME 4-D rotation so it rides the cosmos cell's inside-out turn
      const sp=starGeo.attributes.position.array;
      for(let i=0;i<NSTAR;i++){ const s=star4[i];
        let h=(u-starBirth[i])/0.05; h=h<0?0:h>1?1:h; const f=E*(h*h*(3-2*h));   // expand outward from the centre
        const lx=s[0]*f, ly=s[1]*f, lz=s[2]*f;
        const sx2=lx*Math.cos(aw)-s[3]*Math.sin(aw), sw2=lx*Math.sin(aw)+s[3]*Math.cos(aw);
        const sy2=ly*Math.cos(bw)-sw2*Math.sin(bw), sw3=ly*Math.sin(bw)+sw2*Math.cos(bw);
        const sk=2/(3-sw3); sp[i*3]=sx2*sk; sp[i*3+1]=sy2*sk; sp[i*3+2]=lz*sk; }
      starGeo.attributes.position.needsUpdate=true;
      const flash = u<0.05 ? (1-u/0.05)*0.5 : 0;   // a bright flash at the moment of the bang
      starField.material.userData.op0=0.34+0.60*E+flash;
      D.children[0].material.userData.op0=0.65+0.25*Math.sin(t*1.5);
      cosmosCell.material.userData.op0=0.04+0.05*(0.5+0.5*Math.sin(t*0.8));  // a soft breathing glass wall
      const T=[A,B,C,D]; T.forEach((grp,i)=>{ if(grp.visible) setOpacity(grp,fadeK(reach,i)); });
    }};
  }
});

/* ============================================================= scene switch */
let activeUpdate=null, activeDispose=null;
function loadConcept(idx){
  const c=CONCEPTS[idx];
  if(activeDispose){try{activeDispose();}catch(e){}} activeDispose=null;
  clearGroup(root); clearControls();
  const pIdxEl=document.getElementById('pIdx');
  let __n=0; for(let k=0;k<=idx;k++){ if(!CONCEPTS[k].star) __n++; }
  pIdxEl.textContent = c.star ? '★' : String(__n).padStart(2,'0');
  pIdxEl.classList.toggle('star', !!c.star);
  document.getElementById('pTitle').textContent=c.title;
  const pDim=document.getElementById('pDim');
  pDim.textContent=c.dim||''; pDim.style.display=c.dim?'inline-block':'none';
  const pBlurbEl=document.getElementById('pBlurb');
  document.getElementById('panel').classList.toggle('reflect', !!c.reflection);
  if(c.reflection){
    pBlurbEl.classList.add('reflection');
    pBlurbEl.innerHTML='<span class="rhead">✦ A personal reflection</span>'+
      c.reflection.split('\n\n').map(p=>'<p>'+p.trim()+'</p>').join('');
  } else {
    pBlurbEl.classList.remove('reflection');
    pBlurbEl.textContent=c.blurb;
  }
  [...document.querySelectorAll('.nav-item')].forEach((b,i)=>b.classList.toggle('active',i===idx));
  const cc=c.cam||{};
  cam.theta=cc.theta!=null?cc.theta:0.7;
  cam.phi=cc.phi!=null?cc.phi:1.05;
  cam.radius=(cc.radius!=null?cc.radius:9)*1.12;
  cam.auto=cc.auto!=null?cc.auto:true;
  cam.autoSpeed=cc.autoSpeed!=null?cc.autoSpeed:0.05;
  cam.rmin=cc.rmin!=null?cc.rmin:3; cam.rmax=cc.rmax!=null?cc.rmax:30;
  cam.target.set(...(cc.target||[0,0,0]));
  idle=0;
  const inst=c.build(root);
  activeUpdate=inst&&inst.update?inst.update:null;
  activeDispose=inst&&inst.dispose?inst.dispose:null;
}

/* nav build */
const navEl=document.getElementById('nav');
let __dispNum=0;
CONCEPTS.forEach((c,i)=>{
  const b=document.createElement('button');b.className='nav-item';
  const num = c.star ? '★' : String(++__dispNum).padStart(2,'0');
  b.innerHTML='<span class="num'+(c.star?' star':'')+'">'+num+'</span><span>'+c.title+'</span>'+(c.dim?'<span class="dim">'+c.dim+'</span>':'');
  b.addEventListener('click',()=>loadConcept(i));
  navEl.appendChild(b);
});

/* ---- in-page guided tour, with synced narration + ElevenLabs transcript export ----
   Each beat fires a visual action, then holds for as long as its narration takes to speak.
   The narration is the timing source: per-beat duration is estimated from word count
   (~156 wpm), which also produces the .srt for captions/sync. Provide a voiceover mp3
   (via the "attach voice" button or ?audio=file.mp3) to switch to AUDIO-FOLLOW mode, where
   the visuals track the real audio's playback time instead of the estimate. */
const panelEl=document.getElementById('panel'), panelToggle=document.getElementById('panelToggle');
panelToggle.onclick=()=>{const c=panelEl.classList.toggle('collapsed');
  panelToggle.textContent=c?'▴':'▾'; panelToggle.title=c?'Show panel':'Hide panel';};

// tour action helpers (module scope so the beat list below can reference them)
const sc=i=>navEl.children[i].click();
const tap=txt=>{const el=[...controlsEl.querySelectorAll('.chip')].find(e=>e.textContent.includes(txt)); if(el)el.click();};
const sl=(i,v)=>{const s=controlsEl.querySelectorAll('input[type=range]')[i]; if(s){s.value=v;s.dispatchEvent(new Event('input',{bubbles:true}));}};

// The narration. `concept` switches the scene; `act` performs an interaction. Voice matches
// the book's reflective register — written to be spoken aloud, one breath per beat.
const TOUR_BEATS=[
  {concept:0, say:"Imagine a microscope powerful enough to magnify a billion times — and turn it on a scrap of living flesh."},
  {act:()=>tap('auto-dive'), say:"Watch the solid world fall apart. Muscle resolves into fibres; the fibres into long coiled molecules; the molecules into a lattice of trembling atoms. Press deeper, and even the atom thins away — its shell dissolving to vacuum, its nucleus to a faint pulsation — until matter is gone, and only restless, empty space remains, threaded with oscillating fields."},
  {concept:1, say:"Hold a single atom still. Almost all of it is void."},
  {act:()=>tap('electron cloud'), say:"Here is the electron — not a speck, but a haze of probability, smeared into a shell around the centre."},
  {act:()=>tap('true scale'), say:"And here is the truth of scale. Were the nucleus a millimetre across, the electron would wander some ten metres away. Your solid hand is very nearly empty."},
  {concept:2, say:"Now the bone within that hand. Magnified, it shows ordered crystals, set like jewels in strands of molecule."},
  {act:()=>sl(0,0.9), say:"Press it, and something strange happens — the crystal answers with a current. Squeeze the bone, and it speaks in electricity."},
  {act:()=>sl(0,-0.9), say:"Reverse the field, and it changes length in reply. The atoms sway back and forth like wheat in the wind — sound flowing through the lattice in rhythm."},
  {concept:3, say:"Step back, and the substance falls away entirely. What remains is a web of fields, each pulsing at its own rate, yet in harmony with its neighbours."},
  {act:()=>tap('disturb'), say:"Disturb one, and the disorder spreads — an organ beating off-key, the body fallen out of tune."},
  {act:()=>sl(0,3.2), say:"But lay a strong, steady rhythm over the whole, and the stray notes are drawn back into key. Bentov saw in this the quiet principle behind healing."},
  {concept:4, say:"Widen the view to the whole planet. Eighty kilometres up floats a skin of charged particles — the ionosphere."},
  {act:()=>sl(0,2000), say:"Positive above, negative below, and the Earth between them: a vast spherical capacitor, charged and waiting."},
  {act:()=>sl(0,200), say:"Through that gap runs a steady gradient — some two hundred volts for every metre you rise. This is the field in which every living body stands."},
  {concept:5, say:"Picture that field as a bowl of stiff jelly, with a few raisins set inside it."},
  {act:()=>tap('poke'), say:"Poke a single raisin, and all the others quiver. None can move without the rest of them feeling it."},
  {act:()=>sl(0,1.0), say:"We are those raisins. Every motion we make travels outward through the field, far and wide around the planet."},
  {concept:6, say:"And the planet itself is ringing. The cavity between Earth and ionosphere hums near seven cycles a second."},
  {act:()=>sl(0,6.0), say:"The body's own faint micromotion sits at almost the same frequency — a system tuned, and waiting to lock."},
  {act:()=>sl(0,7.5), say:"At that pitch the wave is forty thousand kilometres long — the girth of the Earth — and circles the globe in a seventh of a second, through metal, stone and flesh alike."},
  {concept:7, say:"So nothing moves alone. Every body is a raisin in the same stiff jelly; every motion is carried through the one field that couples us all."},
  {act:()=>sl(2,1.0), say:"Now hold that thought, and look at the Tawaf — millions circling as one: one direction, one rhythm, one voice."},
  {act:()=>tap('auto-rise'), say:"If a single raisin's quiver is felt across the planet, what of millions moving in coherence? A standing wave, raised by human hands — rippling through the air, around the Earth, and onward, into dimensions we were never built to perceive."},
];

const WPS=2.6, PAUSE=0.55, MINB=2.6;   // words/sec, breath between beats, minimum beat length
function beatTimes(){ let t=0; const out=[];
  for(const b of TOUR_BEATS){ const w=(b.say||'').trim().split(/\s+/).filter(Boolean).length;
    const spoken=Math.max(MINB, w/WPS); out.push({start:t,spoken,end:t+spoken,beat:b}); t+=spoken+PAUSE; }
  out.total=t; return out; }

let tourRunning=false, tourAbort=false;
// the narration is baked into the repo; the tour auto-plays it and syncs the visuals to it
let tourAudioURL=new URLSearchParams(location.search).get('audio')||'narration.mp3';
// ?record → capture the WebGL canvas + narration into ONE synced file (no screen recorder,
// no UI chrome, no cursor in frame). Recording is bound to the guided tour: click to start.
// (REC was detected at renderer construction so the canvas could be made opaque.)
const RECORD=REC;
if(RECORD){ const s=document.createElement('style');
  s.textContent='html,body,#app,canvas{cursor:none!important}'; document.head.appendChild(s); }
// exact per-beat start times (seconds), baked from the ElevenLabs voiceover by __gen_narration.py.
// null until narration.mp3 is generated → the tour then falls back to estimated word-timing.
let TOUR_CUES=[0.0, 6.815, 31.044, 35.154, 41.342, 51.13, 58.537, 67.315, 76.904, 86.866, 93.635, 103.213, 110.376, 117.806, 126.897, 132.18, 138.241, 144.951, 152.242, 159.382, 169.633, 178.399, 185.852];/*__CUES__*/
const fire=b=>{ if(b.concept!=null) sc(b.concept); if(b.act) b.act(); };
// interruptible wait: resolves the instant the tour is aborted, so Stop responds immediately
const waitAbortable=ms=>new Promise(res=>{ let el=0; const step=80;
  const id=setInterval(()=>{ el+=step; if(tourAbort||el>=ms){clearInterval(id);res();} },step); });

async function playEstimated(times){
  for(const c of times){ if(tourAbort)return; fire(c.beat); await waitAbortable((c.spoken+PAUSE)*1000); }
}
function playAudioFollow(times,audio){
  return new Promise(res=>{
    let started=false, done=false;
    const finish=()=>{ if(!done){ done=true; res(); } };
    // if the mp3 is missing or autoplay is blocked, run the tour silently on estimated timing
    const fallback=()=>{ if(started||done) return; started=true; try{audio.pause();}catch(e){} playEstimated(times).then(finish); };
    audio.addEventListener('error',fallback,{once:true});
    const go=()=>{
      if(started||done) return; started=true;
      const useCues=Array.isArray(TOUR_CUES)&&TOUR_CUES.length===times.length;   // exact baked timestamps
      const scale=(!useCues&&audio.duration&&isFinite(audio.duration)&&times.total>0)?audio.duration/times.total:1;
      const cueAt=i=>useCues?TOUR_CUES[i]:times[i].start*scale;
      let idx=0;
      const tick=()=>{
        if(tourAbort){ audio.pause(); return finish(); }
        const ct=audio.currentTime;
        while(idx<times.length && ct>=cueAt(idx)){ fire(times[idx].beat); idx++; }
        if(audio.ended || (idx>=times.length && ct>=(audio.duration||0)-0.05)) return finish();
        requestAnimationFrame(tick);
      };
      requestAnimationFrame(tick);
    };
    if(audio.readyState>=1) go(); else audio.addEventListener('loadedmetadata',go,{once:true});
    audio.play().catch(fallback);
  });
}
// ---- canvas + narration recorder (only active under ?record) ----
const rec=(function(){
  let mr=null, chunks=[], actx=null, prevPR=null;
  // prefer hardware-encoded H.264 (smooth + no conversion), then VP8 (light), then VP9 (heavy)
  const pickMime=()=>['video/mp4;codecs=avc1.640028,mp4a.40.2','video/mp4;codecs=avc1.4d4028','video/mp4',
    'video/webm;codecs=vp8,opus','video/webm;codecs=vp9,opus','video/webm']
    .find(m=>window.MediaRecorder&&MediaRecorder.isTypeSupported(m))||'';
  function start(audio){
    if(mr) return;
    try{
      // cap the captured buffer to ~1080p so the encoder can hold 60fps
      // (retina is 2x = 4x the pixels → real-time encode falls behind → dropped frames/speckle)
      prevPR=renderer.getPixelRatio();
      renderer.setPixelRatio(Math.min(prevPR, Math.max(1, 1080/Math.max(1,app.clientHeight))));
      resize();                                                     // apply the new buffer size before capturing
      const vstream=renderer.domElement.captureStream(60);          // the canvas pixels, live
      actx=new (window.AudioContext||window.webkitAudioContext)();
      if(actx.state==='suspended') actx.resume();
      const src=actx.createMediaElementSource(audio);
      const dest=actx.createMediaStreamDestination();
      src.connect(actx.destination);                                // you still hear it
      src.connect(dest);                                            // and it gets recorded
      const stream=new MediaStream([...vstream.getVideoTracks(), ...dest.stream.getAudioTracks()]);
      const mime=pickMime(); chunks=[];
      mr=new MediaRecorder(stream, Object.assign({videoBitsPerSecond:12e6}, mime?{mimeType:mime}:{}));
      mr.ondataavailable=e=>{ if(e.data&&e.data.size) chunks.push(e.data); };
      mr.onstop=()=>{
        const type=(mr&&mr.mimeType)||'video/webm';
        const ext=type.indexOf('mp4')>=0?'mp4':'webm';
        const a=document.createElement('a');
        a.href=URL.createObjectURL(new Blob(chunks,{type}));
        a.download='chapter2-tour.'+ext; document.body.appendChild(a); a.click(); a.remove();
        setTimeout(()=>URL.revokeObjectURL(a.href),5000);
        try{ if(actx) actx.close(); }catch(e){}
        if(prevPR!=null){ renderer.setPixelRatio(prevPR); resize(); }  // restore full-res interactive view
        mr=null; actx=null; chunks=[]; prevPR=null; console.log('[record] saved chapter2-tour.'+ext);
      };
      mr.start(); console.log('[record] recording… '+(mime||'default codec'));
    }catch(e){ console.warn('[record] could not start:', e); mr=null; }
  }
  function stop(){ if(mr && mr.state!=='inactive'){ try{mr.stop();}catch(e){} } }
  return {start,stop};
})();

async function runGuidedTour(){
  if(tourRunning){ tourAbort=true; return; }
  tourRunning=true; tourAbort=false;
  const wasOpen=!panelEl.classList.contains('collapsed');
  if(wasOpen){ panelEl.classList.add('collapsed'); panelToggle.textContent='▴'; }  // give the visuals the screen
  tourBtn.textContent='● touring · stop';
  const times=beatTimes();
  let audio=null;
  try{
    if(tourAudioURL){
      audio=new Audio(tourAudioURL);
      if(RECORD) rec.start(audio);            // start capture right before playback → exact-length clip
      await playAudioFollow(times,audio);
    }
    else { await playEstimated(times); }
  }catch(e){}
  if(audio){ try{audio.pause();}catch(e){} }
  // switch off any auto-dive / auto-rise still running in the current scene
  [...controlsEl.querySelectorAll('.chip')].forEach(c=>{ if(/diving|rising/i.test(c.textContent)) c.click(); });
  // hold the recording ~3s past the narration so the closing visual can breathe
  // (silent tail; aborts early if Stop is pressed). then flush + auto-download.
  if(RECORD){ if(!tourAbort) await waitAbortable(3000); rec.stop(); }
  // leave the panel hidden so the final visual can be reflected on undisturbed
  // (the ▴ toggle remains available to bring it back manually)
  tourRunning=false; tourAbort=false; tourBtn.textContent='▶ Guided tour';
}

// ---- guided-tour button (top-right) ----
const tourBtn=document.createElement('button');
Object.assign(tourBtn.style,{position:'fixed',top:'74px',right:'28px',zIndex:7,
  font:'500 10px/1 "IBM Plex Mono",monospace',letterSpacing:'.16em',textTransform:'uppercase',
  padding:'8px 12px',borderRadius:'8px',border:'1px solid var(--line)',
  background:'rgba(10,14,26,.6)',color:'var(--ink)',cursor:'pointer',backdropFilter:'blur(10px)'});
tourBtn.textContent='▶ Guided tour';
tourBtn.onclick=runGuidedTour;
app.appendChild(tourBtn);

if(/[?&]tour\b/.test(location.search)) setTimeout(()=>runGuidedTour(),800);

/* ============================================================= loop */
function resize(){
  const w=app.clientWidth,h=app.clientHeight;
  renderer.setSize(w,h);camera.aspect=w/h;camera.updateProjectionMatrix();
}
window.addEventListener('resize',resize);

function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05);
  const t=clock.getElapsedTime();
  idle+=dt; if(idle>4 && !dragging) cam.auto=true;
  if(cam.auto) cam.theta += cam.autoSpeed*dt;
  applyCam();
  if(scene.userData.stars) scene.userData.stars.rotation.y += dt*0.006;
  if(activeUpdate) activeUpdate(dt,t);
  renderer.render(scene,camera);
}

resize();
loadConcept(0);
document.getElementById('loader').style.display='none';
animate();
})();
</script>
